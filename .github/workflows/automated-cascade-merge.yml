name: Cascade Merge

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch:

jobs:
  merge_cascade:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Git
      run: |
        git config --global user.name 'automated-github-actions-via-hans'
        git config --global user.email 'hans.boeren@qframe.be'

    - name: Check for changes between develop and develop-refactor-current
      id: check_changes_refactor
      run: |
        git fetch origin
        if git diff --quiet origin/develop origin/develop-refactor-current; then
          echo "No changes detected"
          echo "changes=false" >> $GITHUB_ENV
        else
          echo "Changes detected"
          echo "changes=true" >> $GITHUB_ENV
        fi

    - name: Merge develop into develop-refactor-current
      if: env.changes == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git fetch origin
        git checkout -b develop-refactor-current-merge origin/develop-refactor-current
        git merge origin/develop || {
          echo "Conflict detected, aborting merge"
          git merge --abort
          exit 1
        }
        git push origin develop-refactor-current-merge
      # if we use push origin develop-refactor-current, and it is allowed it will just push w/o pr

    - name: Create PR for develop-refactor-current
      if: env.changes == 'true'
      run: |
        gh pr create --base develop-refactor-current-merge --head develop-refactor-current 
        --title 'Merge develop into evelop-refactor-current ' 
        --body 'Automated merge of develop into evelop-refactor-current'

