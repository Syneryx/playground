name: Cascade Merge
 
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual triggering of the workflow - via the ui ?
 
jobs:
  merge_cascade:
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout
      uses: actions/checkout@v2
 
    - name: Set up Git
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'hans.boeren@qframe.be'
 
    - name: Merge develop into develop-refactor-refactor
      run: |
        git fetch origin
        git checkout develop-refactor-refactor
        git merge origin/develop || echo "Conflict detected" && exit 1
        git push origin develop-refactor-refactor
 
    - name: Create PR for develop-refactor-refactor
      if: success()
      uses: peter-evans/create-pull-request@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: develop-refactor-refactor
        title: 'Merge develop into develop-refactor-refactor'
        body: 'Automated merge of develop into develop-refactor-refactor'
 
    - name: Merge develop-refactor-refactor into develop-main-next-1
      run: |
        git fetch origin
        git checkout develop-main-next-1
        git merge origin/develop-refactor-refactor || echo "Conflict detected" && exit 1
        git push origin develop-main-next-1
 
    - name: Create PR for develop-main-next-1
      if: success()
      uses: peter-evans/create-pull-request@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: develop-main-next-1
        title: 'Merge develop-refactor-refactor into develop-main-next-1'
        body: 'Automated merge of develop-refactor-refactor into develop-main-next-1'
 
    - name: Merge develop-main-next-1 into develop-refactor-next-1
      run: |
        git fetch origin
        git checkout develop-refactor-next-1
        git merge origin/develop-main-next-1 || echo "Conflict detected" && exit 1
        git push origin develop-refactor-next-1
 
    - name: Create PR for develop-refactor-next-1
      if: success()
      uses: peter-evans/create-pull-request@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: develop-refactor-next-1
        title: 'Merge develop-main-next-1 into develop-refactor-next-1'
        body: 'Automated merge of develop-main-next-1 into develop-refactor-next-1'
 
    - name: Notify team of conflicts
      if: failure()
      run: |
        echo "Conflict detected during merging process. Please resolve the conflicts manually."
        # You can add Slack or email notifications here