name: Cascade Merge
 
on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual triggering of the workflow - via the ui ?
 
jobs:
  merge_cascade:
    runs-on: ubuntu-latest
 
    steps:
    - name: Checkout
      uses: actions/checkout@v2
 
    - name: Set up Git
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'hans.boeren@qframe.be'

    - name: Check for changes between develop and develop-refactor-current
      id: check_changes_refactor
      run: |
        git fetch origin
        if git diff --quiet origin/develop origin/develop-refactor-current; then
          echo "No changes detected"
          echo "changes=false" >> $GITHUB_ENV
        else
          echo "Changes detected"
          echo "changes=true" >> $GITHUB_ENV
        fi

    - name: Merge develop into develop-refactor-current
      if: env.changes == 'true'
      run: |
        git fetch origin
        git checkout develop-refactor-current
        git merge origin/develop || echo "Conflict detected" && exit 1
        git push origin develop-refactor-current

    - name: Create PR for develop-refactor-current
      if: env.changes == 'true'
      uses: peter-evans/create-pull-request@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: develop-refactor-current
        title: 'Merge develop into develop-refactor-current'
        body: 'Automated merge of develop into develop-refactor-current'

    - name: Check for changes between develop-refactor-current and develop-main-next-1
      id: check_changes_main_next_1
      run: |
        git fetch origin
        if git diff --quiet origin/develop-refactor-current origin/develop-main-next-1; then
          echo "No changes detected"
          echo "changes=false" >> $GITHUB_ENV
        else
          echo "Changes detected"
          echo "changes=true" >> $GITHUB_ENV
        fi

    - name: Merge develop-refactor-current into develop-main-next-1
      if: env.changes == 'true'
      run: |
        git fetch origin
        git checkout develop-main-next-1
        git merge origin/develop-refactor-current || echo "Conflict detected" && exit 1
        git push origin develop-main-next-1

    - name: Create PR for develop-main-next-1
      if: env.changes == 'true'
      uses: peter-evans/create-pull-request@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: develop-main-next-1
        title: 'Merge develop-refactor-current into develop-main-next-1'
        body: 'Automated merge of develop-refactor-current into develop-main-next-1'

    - name: Check for changes between develop-main-next-1 and develop-refactor-next-1
      id: check_changes_refactor_next_1
      run: |
        git fetch origin
        if git diff --quiet origin/develop-main-next-1 origin/develop-refactor-next-1; then
          echo "No changes detected"
          echo "changes=false" >> $GITHUB_ENV
        else
          echo "Changes detected"
          echo "changes=true" >> $GITHUB_ENV
        fi

    - name: Merge develop-main-next-1 into develop-refactor-next-1
      if: env.changes == 'true'
      run: |
        git fetch origin
        git checkout develop-refactor-next-1
        git merge origin/develop-main-next-1 || echo "Conflict detected" && exit 1
        git push origin develop-refactor-next-1

    - name: Create PR for develop-refactor-next-1
      if: env.changes == 'true'
      uses: peter-evans/create-pull-request@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: develop-refactor-next-1
        title: 'Merge develop-main-next-1 into develop-refactor-next-1'
        body: 'Automated merge of develop-main-next-1 into develop-refactor-next-1'

    - name: Notify team of conflicts
      if: failure()
      run: |
        echo "Conflict detected during merging process. Please resolve the conflicts manually."
        # You can add Slack or email notifications here